spring.application.name=dealer-inventory-service

# =====================
# DATABASE CONFIGURATION
# =====================

# PostgreSQL Database - IMPORTANT: Escape @ in password and use proper database name
spring.datasource.url=jdbc:postgresql://localhost:5432/dealer-inventory
spring.datasource.username=postgres
spring.datasource.password=@abbassadiq
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.main.allow-bean-definition-overriding=true


# =====================
# SERVER CONFIGURATION
# =====================
server.port=8080
server.error.include-stacktrace=never
server.servlet.context-path=/

# =====================
# LOGGING CONFIGURATION
# =====================
logging.level.org.springframework=INFO
logging.level.com.ziai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE